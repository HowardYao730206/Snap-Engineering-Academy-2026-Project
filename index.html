<!DOCTYPE html>
<html>
<head>
  <title>USA Food Atlas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <h1>USA Food Atlas</h1>
    <p>Click a state to explore its food</p>
  </header>

  <!-- Controls -->
  <div class="controls">
    <label>Search:</label>
    <input type="text" id="searchInput" placeholder="Name of the Restaurant" />

    <label>Sort:</label>
    <select id="sortSelect">
      <option value="default">Default</option>
      <option value="rating">Highest Rated</option>
      <option value="name">Name A-Z</option>
    </select>
  </div>

  <!-- Main layout: map + panel side by side -->
  <div class="main-layout">

    <div class="map-side">
      <p>Map goes here</p>
    </div>

    <div class="right-panel">
      <h2 id="stateName">All States</h2>
      <p id="stateSpecialty"></p>
      <p id="restaurantCount"></p>
      <div id="cardList"></div>
    </div>

  </div>

  <script src="scripts.js"></script>
</body>
</html>
