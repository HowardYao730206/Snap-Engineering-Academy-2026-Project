<!DOCTYPE html>
<html>
<head>
  <title>USA Food Atlas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <h1>🍽️ USA Food Atlas</h1>
    <p>Click a state to explore its food</p>
  </header>

  <!-- Controls -->
  <div class="controls">
    <label>Search:</label>
    <input type="text" id="searchInput" placeholder="Restaurant name..." />

    <label>Sort:</label>
    <select id="sortSelect">
      <option value="default">Default</option>
      <option value="rating-desc">Rating: High to Low</option>
      <option value="rating-asc">Rating: Low to High</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="name">Name A-Z</option>
    </select>
  </div>

  <!-- Main layout: map + panel side by side -->
  <div class="main-layout">

    <div class="map-side">
      <p>Click any state to filter — click again to show all</p>
      <div id="mapContainer"></div>
    </div>

    <div class="right-panel">
      <div class="state-heading">
        <h2 id="stateName">All States</h2>
        <p id="stateSpecialty"></p>
        <span id="restaurantCount"></span>
      </div>
      <div id="cardList"></div>
    </div>

  </div>

  <script src="data.js"></script>
  <script src="scripts.js"></script>
</body>
</html>
